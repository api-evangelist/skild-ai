aid: skild-ai
name: Skild AI
description: >-
  Skild AI is a Pittsburgh-founded robotics AI company developing the Skild
  Brain, a general-purpose, omni-bodied physical AI system intended to
  control many different robot embodiments across many tasks without being
  tied to a specific hardware design. The company is initially targeting
  three application platforms: security and inspection robots that can
  navigate dangerous environments, mobile manipulation systems combining
  grasping and navigation, and autonomous packing with dexterous skills.
  Skild publishes a research blog discussing topics such as learning from
  humans and video data. The company is backed by Sequoia, General Catalyst,
  Felicis, SoftBank, Bezos Expeditions, and other investors. Skild AI does
  not currently publish a public API, SDK, model weights, or developer
  documentation; commercial engagement appears to run through direct
  partnerships and pilots.
